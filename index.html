

<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Update Timer</title>
    <style>
        /* Estilo para bumagay sa dark mode ng Binance Futures interface mo */
        body {
            background-color: #161a1e;
            color: #eaecef;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .timer-container {
            background-color: #1e2329;
            border: 1px solid #474d57;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .timer-label {
            font-size: 14px;
            color: #848e9c;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #timer-display {
            font-size: 48px;
            font-weight: bold;
            color: #f0b90b; /* Binance yellow gold color */
            font-family: 'Courier New', Courier, monospace;
        }

        .status-message {
            margin-top: 10px;
            font-size: 12px;
            color: #0ecb81; /* Green color para sa update status */
        }
    </style>
</head>
<body>

    <div class="timer-container">
        <div class="timer-label">Susunod na Awtomatikong Update</div>
        <div id="timer-display">05:30</div>
        <div id="status-text" class="status-message">Aktibo ang koneksyon sa merkado...</div>
    </div>

    <script>
        // 5 minuto at 30 segundo = 330 segundo kabuuan
        const STARTING_TIME = 330; 
        let timeRemaining = STARTING_TIME;

        const timerDisplay = document.getElementById('timer-display');
        const statusText = document.getElementById('status-text');

        function startCountdown() {
            const countdownInterval = setInterval(() => {
                // Pag-compute sa minuto at segundo
                let minutes = Math.floor(timeRemaining / 60);
                let seconds = timeRemaining % 60;

                // Lagyan ng zero sa unahan kung single digit na lang ang numero
                minutes = minutes < 10 ? '0' + minutes : minutes;
                seconds = seconds < 10 ? '0' + seconds : seconds;

                // Ipakita ang tumatakbong oras sa screen
                timerDisplay.innerText = `${minutes}:${seconds}`;

                // Kapag umabot na sa 0:00 ang timer
                if (timeRemaining <= 0) {
                    clearInterval(countdownInterval); // Itigil ang kasalukuyang timer loop
                    
                    triggerUpdate(); // Patakbuhin ang code para mag-update ng data
                    
                    timeRemaining = STARTING_TIME; // I-reset muli ang oras sa 5:30
                    startCountdown(); // Muling simulan ang countdown
                } else {
                    timeRemaining--; // Bawasan ng isang segundo kada takbo
                }
            }, 1000); // 1000 milliseconds = 1 segundo
        }

        // Dito mo ilalagay ang mangyayari kapag natapos ang 5:30 mins
        function triggerUpdate() {
            statusText.innerText = "Nag-a-update ng mga presyo...";
            statusText.style.color = "#f0b90b"; // Gawing dilaw habang nag-a-update

            console.log("Nagsimula ang pag-update ng datos ng merkado.");

            // KUNG GUSTONG I-REFRESH ANG BUONG WEB PAGE:
            // window.location.reload();

            // KUNG DATA FETCHING LANG ANG GAGAWIN:
            // Pagkatapos ng kunwaring update (isang segundo), ibalik sa berde ang status text
            setTimeout(() => {
                statusText.innerText = "Matagumpay na na-update ang mga presyo!";
                statusText.style.color = "#0ecb81";
            }, 1000);
        }

        // Awtomatikong patakbuhin ang countdown pagkabukas na pagkabukas ng page
        startCountdown();
    </script>

</body>
</html>
